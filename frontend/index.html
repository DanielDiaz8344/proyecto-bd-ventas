<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Ventas e Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="navbar-slot"></div>

    <main class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Dashboard</h1>
                <p class="text-muted mb-0">Resumen general del sistema</p>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card dashboard-card text-bg-primary">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-uppercase small">Productos</div>
                                <div class="numero-grande" id="num-productos">--</div>
                            </div>
                            <i class="bi bi-box-seam icono"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card text-bg-success">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-uppercase small">Clientes</div>
                                <div class="numero-grande" id="num-clientes">--</div>
                            </div>
                            <i class="bi bi-people icono"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card text-bg-info">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-uppercase small">Ventas registradas</div>
                                <div class="numero-grande" id="num-ventas">--</div>
                            </div>
                            <i class="bi bi-cart-check icono"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card text-bg-warning">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-uppercase small">Alertas de stock</div>
                                <div class="numero-grande" id="num-alertas">--</div>
                            </div>
                            <i class="bi bi-exclamation-triangle icono"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="h5 mb-3">Acceso rápido</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <a href="pages/ventas.html" class="card dashboard-card h-100 text-decoration-none">
                    <div class="card-body">
                        <h5><i class="bi bi-cart-plus"></i> Registrar venta</h5>
                        <p class="text-muted small mb-0">Crear una nueva factura y descontar inventario</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="pages/productos.html" class="card dashboard-card h-100 text-decoration-none">
                    <div class="card-body">
                        <h5><i class="bi bi-box-seam"></i> Gestionar productos</h5>
                        <p class="text-muted small mb-0">Catálogo, precios y categorías</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="pages/inventario.html" class="card dashboard-card h-100 text-decoration-none">
                    <div class="card-body">
                        <h5><i class="bi bi-clipboard-data"></i> Ver inventario</h5>
                        <p class="text-muted small mb-0">Stock por almacén y kardex</p>
                    </div>
                </a>
            </div>
        </div>

    </main>

    <div id="footer-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        (async () => {
            try {
                const [productos, clientes, ventas, alertas] = await Promise.all([
                    api.get('/productos'),
                    api.get('/clientes'),
                    api.get('/ventas'),
                    api.get('/inventario/alertas')
                ]);
                document.getElementById('num-productos').textContent = productos.length;
                document.getElementById('num-clientes').textContent  = clientes.length;
                document.getElementById('num-ventas').textContent    = ventas.length;
                document.getElementById('num-alertas').textContent   = alertas.length;
            } catch (err) {
                console.error('Error cargando dashboard:', err);
            }
        })();
    </script>
</body>
</html>
