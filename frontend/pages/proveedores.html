<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Proveedores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="navbar-slot"></div>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Proveedores</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProveedor" onclick="abrirModalCrear()">
                <i class="bi bi-plus-lg"></i> Nuevo proveedor
            </button>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>RIF</th>
                            <th>Nombre / Razón social</th>
                            <th>Contacto</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th class="tabla-acciones">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-proveedores"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalProveedor" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="form-proveedor">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-titulo">Nuevo proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="prov-id">
                        <div class="mb-2"><label class="form-label">RIF *</label>
                            <input class="form-control" id="prov-rif" required></div>
                        <div class="mb-2"><label class="form-label">Razón social *</label>
                            <input class="form-control" id="prov-nombre" required></div>
                        <div class="mb-2"><label class="form-label">Contacto</label>
                            <input class="form-control" id="prov-contacto"></div>
                        <div class="mb-2"><label class="form-label">Teléfono</label>
                            <input class="form-control" id="prov-telefono"></div>
                        <div class="mb-2"><label class="form-label">Email</label>
                            <input type="email" class="form-control" id="prov-email"></div>
                        <div class="mb-2"><label class="form-label">Dirección</label>
                            <textarea class="form-control" id="prov-direccion" rows="2"></textarea></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-slot"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/proveedores.js"></script>
</body>
</html>
