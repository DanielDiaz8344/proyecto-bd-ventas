<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva venta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="navbar-slot"></div>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0"><i class="bi bi-cart-plus"></i> Nueva venta</h1>
            <a href="ventas.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
        </div>

        <div class="row g-3">
            <div class="col-lg-7">
                <div class="card mb-3">
                    <div class="card-header">Datos de la factura</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="form-label">N° Factura *</label>
                                <input class="form-control" id="numero-factura" placeholder="FAC-2026-XXXX">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Cliente *</label>
                                <select class="form-select" id="select-cliente"></select>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Vendedor *</label>
                                <select class="form-select" id="select-usuario"></select>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Almacén *</label>
                                <select class="form-select" id="select-almacen"></select>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Método de pago</label>
                                <select class="form-select" id="select-pago">
                                    <option value="efectivo">Efectivo</option>
                                    <option value="tarjeta">Tarjeta</option>
                                    <option value="transferencia">Transferencia</option>
                                    <option value="mixto">Mixto</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Agregar productos</div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-5">
                                <select class="form-select" id="select-producto"></select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control" id="input-cantidad" placeholder="Cantidad" min="1" value="1">
                            </div>
                            <div class="col-md-3">
                                <input type="number" step="0.01" class="form-control" id="input-precio" placeholder="Precio">
                            </div>
                            <div class="col-md-1">
                                <button class="btn btn-primary w-100" onclick="agregarItem()"><i class="bi bi-plus-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header">Carrito</div>
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th class="text-end">Cant.</th>
                                    <th class="text-end">P. Unit.</th>
                                    <th class="text-end">Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-carrito"></tbody>
                            <tfoot>
                                <tr><td colspan="3" class="text-end">Subtotal:</td><td class="text-end" id="r-subtotal">$0.00</td><td></td></tr>
                                <tr>
                                    <td colspan="3" class="text-end">Descuento:</td>
                                    <td class="text-end"><input type="number" step="0.01" class="form-control form-control-sm text-end" id="r-descuento" value="0" onchange="actualizarTotales()"></td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td colspan="3" class="text-end">Impuesto:</td>
                                    <td class="text-end"><input type="number" step="0.01" class="form-control form-control-sm text-end" id="r-impuesto" value="0" onchange="actualizarTotales()"></td>
                                    <td></td>
                                </tr>
                                <tr class="fw-bold table-light"><td colspan="3" class="text-end">TOTAL:</td><td class="text-end" id="r-total">$0.00</td><td></td></tr>
                            </tfoot>
                        </table>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success w-100" id="btn-registrar" onclick="registrar()">
                            <i class="bi bi-check-circle"></i> Registrar venta
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-slot"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/nueva-venta.js"></script>
</body>
</html>
